# Curated TAA universe — 3 antigens for v0.2 (HER2 + BCMA + CLDN18.2).
# All three are heavily-trafficked targets with diverse modality coverage,
# good stress-test for the cross-cut grid + canonical-drug rollup logic.
#
# Per-antigen exclude_terms filter false positives from CT.gov / PubMed alias
# matching (e.g., short aliases like "NEU" or "CD3" that match unrelated
# trials need explicit exclude rules; long unambiguous aliases like "ERBB2"
# don't).

- slug: her2
  primary_name: HER2
  aliases:
    - ERBB2
    - CD340
  uniprot_id: P04626
  hgnc_symbol: ERBB2
  indication_tags:
    - breast
    - gastric
    - NSCLC
    - colorectal
    - urothelial
  notes: >
    The most heavily-trafficked TAA in oncology. Anchor antigen for v0.1 vertical
    slice. Note: dropped "NEU" alias (matches neurology / neuroendocrine /
    neutropenia trials).
  exclude_terms: []

- slug: bcma
  primary_name: BCMA
  aliases:
    - TNFRSF17
    - CD269
  uniprot_id: Q02223
  hgnc_symbol: TNFRSF17
  indication_tags:
    - multiple myeloma
    - heme
  notes: >
    Multiple myeloma antigen. Two approved CAR-Ts (Carvykti, Abecma) plus a
    bispecific (Tecvayli/teclistamab); ADC and second-gen CAR-T tier emerging.
    Test of the per-modality breakdown when CAR-T leads.
  exclude_terms: []

- slug: cldn18-2
  primary_name: CLDN18.2
  aliases:
    - Claudin 18.2
    - Claudin-18.2
    - CLDN18A2
  uniprot_id: P56856
  hgnc_symbol: CLDN18
  indication_tags:
    - gastric
    - pancreatic
    - GEJ
  notes: >
    Hot target since zolbetuximab (Astellas mAb) approval in 2024-2025.
    Tests the system on a younger landscape — fewer canonical drugs but
    growing fast. Bispecific + ADC + CAR-T tiers still developing.
  exclude_terms: []
