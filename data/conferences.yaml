# Curated oncology / biotech conference calendar — drives the "upcoming
# catalysts" view. Each entry is one meeting where TAA data routinely drops.
#
# Schema:
#   name:         display name
#   start_date:   first day (YYYY-MM-DD)
#   end_date:     last day (YYYY-MM-DD)
#   location:     city
#   url:          official meeting page (for citation)
#   relevance:    list of indication tags this meeting reliably covers — used
#                 to filter per-antigen ("ovarian" meetings won't surface on a
#                 heme-only antigen). Empty list = surface for all antigens.
#
# Curated 2026-05; refresh annually. Dates verified against official society
# pages where available. Beyond ~18mo the schedule is speculative — keep entries
# concrete and remove anything that slips into "TBD".

