  - "ARX788"
  - "MRG002"
  - "BB-1701"
  # BCMA-targeting ADCs
  - "belantamab mafodotin"
  - "GSK2857916"
  - "Blenrep"
  # CLDN18.2-targeting ADCs
  - "CMG901"
  - "AZD0901"
  - "TST001"  # also bispecific candidate, ordered ADC-first
  - "LM-302"
  - "RC118"
