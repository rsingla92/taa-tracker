# Drug name → modality lookup.
#
# Substring match, case-insensitive. **Longest match wins** (see
# taa/normalize.py:match_canonical_drug), so generic catch-alls like "CAR-T"
# can coexist with specific drugs like "ciltacabtagene" — the specific drug
# always beats the fallback.
#
# Drug names appear in CT.gov interventions in many forms: "T-DXd (DS-8201)",
# "Trastuzumab deruxtecan", "DS-8201a", etc. Listing any form is enough to match.
#
# Unknown drugs default to "other" modality and get surfaced by bin/audit-matches.
#
# Multiple aliases for the same drug (e.g., T-DXd / DS-8201 / Enhertu / trastuzumab
# deruxtecan) should ALL appear in the modality section AND get mapped to one
# canonical name in the `canonical_aliases` block at the bottom of this file.
# Without an alias entry, each name becomes its own Program row.

# ---- Canonical aliases (collapse synonyms into one Program) -------------------
# Maps every alias → primary display name. Used by trials_to_programs to roll
# up trial-sponsor variants. Keys MUST also appear in one of the modality
# sections below (or the substring match won't fire in the first place).
canonical_aliases:
  # HER2 — Enhertu (Daiichi-Sankyo / AstraZeneca ADC)
  "T-DXd": "Trastuzumab deruxtecan"
  "DS-8201": "Trastuzumab deruxtecan"
  "Enhertu": "Trastuzumab deruxtecan"
  "trastuzumab deruxtecan": "Trastuzumab deruxtecan"
  # HER2 — Kadcyla (Genentech ADC)
  "T-DM1": "Trastuzumab emtansine"
  "ado-trastuzumab": "Trastuzumab emtansine"
  "Kadcyla": "Trastuzumab emtansine"
  # HER2 — Herceptin (Roche mAb)
  "trastuzumab": "Trastuzumab"
  "Herceptin": "Trastuzumab"
  # HER2 — Perjeta (Roche mAb)
  "pertuzumab": "Pertuzumab"
  "Perjeta": "Pertuzumab"
  # HER2 — Margenza (MacroGenics mAb)
  "margetuximab": "Margetuximab"
  "Margenza": "Margetuximab"
  # HER2 — RC48 / Aidixi (RemeGen ADC)
  "disitamab vedotin": "Disitamab vedotin"
  "RC48": "Disitamab vedotin"
  # HER2 — Trastuzumab duocarmazine (Byondis ADC)
  "trastuzumab duocarmazine": "Trastuzumab duocarmazine"
  "SYD985": "Trastuzumab duocarmazine"
  "vic-trastuzumab": "Trastuzumab duocarmazine"
  # HER2 — Zanidatamab (Jazz/Zymeworks bispecific)
  "zanidatamab": "Zanidatamab"
  "ZW25": "Zanidatamab"
  # HER2 — Tucatinib (Seagen kinase — historically mapped as mAb in this map; left alone)
  # CLDN18.2 — Vyloy / zolbetuximab (Astellas mAb)
  "zolbetuximab": "Zolbetuximab"
  "Vyloy": "Zolbetuximab"
  "IMAB362": "Zolbetuximab"
  # BCMA — Carvykti (Janssen CAR-T)
  "ciltacabtagene": "Ciltacabtagene autoleucel"
  "Carvykti": "Ciltacabtagene autoleucel"
  # BCMA — Abecma (BMS/2seventy CAR-T)
  "idecabtagene": "Idecabtagene vicleucel"
  "Abecma": "Idecabtagene vicleucel"
  # BCMA — Tecvayli (Janssen bispecific)
  "teclistamab": "Teclistamab"
  "Tecvayli": "Teclistamab"
  # BCMA — Elrexfio (Pfizer bispecific)
  "elranatamab": "Elranatamab"
  "Elrexfio": "Elranatamab"
  # BCMA — Belantamab mafodotin (GSK ADC; withdrawn 2022, returning 2024+)
  "belantamab mafodotin": "Belantamab mafodotin"
  "GSK2857916": "Belantamab mafodotin"
  # ROR1 — Zilovertamab vedotin (Merck/VelosBio ADC). The naked mAb
  # "Zilovertamab" stays its own row because it's a distinct clinical program.
  "zilovertamab vedotin": "Zilovertamab vedotin"
  "MK-2140": "Zilovertamab vedotin"
  "VLS-101": "Zilovertamab vedotin"
  # ROR1 — Cirmtuzumab (Oncternal/UCSD mAb)
  "cirmtuzumab": "Cirmtuzumab"
  "UC-961": "Cirmtuzumab"
  # B7-H4 — Puxitatug samrotecan (AstraZeneca ADC)
  "puxitatug samrotecan": "Puxitatug samrotecan"
  "AZD8205": "Puxitatug samrotecan"
  # B7-H3 — Ifinatamab deruxtecan / DS-7300 (Daiichi-Sankyo ADC; the YAML has
  # "ifinatamab deruxtecan" elsewhere; no alias collision presently)

