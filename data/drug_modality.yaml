# ---- Drug → antigen registry --------------------------------------------------
# Maps a drug name (or alias) to the antigen slug it targets. Used by the CT.gov
# source to expand its alias-based query: trials whose title/intervention only
# mentions the drug codename ("HS-20089 in Ovarian Cancer") are otherwise
# silently dropped because the antigen alias regex doesn't match.
#
# **Maintenance rule.** Every drug listed in a modality section above whose
# target is a specific antigen in data/antigens.yaml MUST appear here. The
# coverage audit run at the end of `taa-refresh` writes a warning to
# `data/_coverage-{slug}.txt` for any drug in this map that returned zero
# CT.gov hits — catches licensing-handoff relabels (Hansoh → GSK, etc.) and
# drugs that genuinely have no CT.gov footprint.
#
# Generic markers ("CAR-T", "vaccine", "radioligand", "Lu-177", etc.) are NOT
# listed here because they're not antigen-specific.
